volunteers:
  - title: "🫶🙏🏼 Рятуємо життя разом: «Вільногірськ Онлайн» відкриває збір на евакуаційні ноші для Захисників"
    description: |
      Відкриваємо важливий збір для підтримки українських військових. «Вільногірськ Онлайн» звертається до небайдужих мешканців громади долучитися до закупівлі матеріалів для пошиття евакуаційних м’яких нош, які щодня допомагають рятувати життя на передовій.

      Йдеться про спеціальні ноші, що використовуються у бойових підрозділах, медичних евакуаційних екіпажах та на стабілізаційних пунктах. Саме вони дозволяють швидко та безпечно транспортувати поранених із зони бойових дій.

      Для виготовлення необхідні тканина, стропа та супутні матеріали. Загальна сума збору становить 12 000 гривень. 

      Кожен внесок — це реальна допомога тим, хто щодня ризикує життям заради України. Долучитися може кожен: навіть невелика сума наближає до спільної мети — врятованих життів.

      Разом — сильні. Разом — непереможні 🇺🇦
